style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/danylo829/containery
options:
  tag_filter_pattern: '^v'
  commits:
    filters:
      Type:
        - feat
        - fix
        - perf
        - refactor
  commit_groups:
    title_maps:
      feat: Features
      fix: Bug Fixes
      perf: Performance Improvements
      refactor: Code Refactoring
  header:
    pattern: '^\[(\w+)\]\s+\[(\w+)\]\s+(.+)'
    pattern_maps:
      - Type
      - Scope
      - Subject